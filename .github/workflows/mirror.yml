name: Mirror to self-hosted git

# Mirrors every push (all branches + tags, including deletions) to the self-hosted
# repository at suren96.duckdns.org. Set the repo secret MIRROR_URL to the full
# authenticated push URL, e.g.:
#   https://<user>:<token>@suren96.duckdns.org/git/Knight3000X/STL-generator.git
# (Settings -> Secrets and variables -> Actions -> New repository secret.)
on:
  push:
    branches: ['**']
    tags: ['**']
  # Propagate branch/tag deletions to the mirror as well.
  delete:
  workflow_dispatch:

# Don't overlap mirror pushes; let one finish before the next.
concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror-clone from GitHub
        run: |
          git clone --mirror \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            repo.git

      - name: Push --mirror to self-hosted
        working-directory: repo.git
        env:
          MIRROR_URL: ${{ secrets.MIRROR_URL }}
        run: |
          if [ -z "$MIRROR_URL" ]; then
            echo "::error::MIRROR_URL secret is not set. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          # Add the destination quietly so the credential-bearing URL never prints.
          git remote add mirror "$MIRROR_URL"
          # --mirror sends every ref and prunes refs deleted on GitHub.
          git push --mirror mirror
